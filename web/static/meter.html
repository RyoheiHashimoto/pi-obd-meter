<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>pi-obd-meter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #ccc;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    width: 800px; height: 480px;
    overflow: hidden;
    margin: 0 auto;
    cursor: none;
  }
  .dashboard {
    display: grid;
    grid-template-rows: 32px auto auto 44px;
    align-content: center;
    height: 100%;
    padding: 0 4px;
  }
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 8px;
    font-size: 16px;
    color: #999;
    border-bottom: 1px solid #111;
  }
  .header > :last-child { text-align: right; }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 6px rgba(76,175,80,0.6);
    margin-right: 4px;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .alert-bar {
    background: rgba(26,10,0,0.95);
    border: 1px solid #ff6600;
    border-radius: 2px;
    padding: 1px 8px;
    font-size: 14px;
    color: #ffb74d;
    display: none;
  }
  .alert-bar.active { display: inline-block; }
  .top-gauges {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    position: relative;
  }
  .top-gauges svg { margin: 0 -24px; }
  .gear-indicator {
    position: absolute;
    left: 50%; top: 45%;
    transform: translate(-50%, -50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .gear-box {
    width: 40px; height: 40px;
    border: 1px solid #333;
    border-radius: 5px;
    background: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #333;
    transition: all 0.3s ease-out;
  }
  .gear-box.active {
    border-color: #69f0ae;
    color: #69f0ae;
    box-shadow: 0 0 8px rgba(105,240,174,0.4);
  }
  .mid-gauges {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-top: -6px;
  }
  .sub-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    padding: 2px 16px;
    border-top: 1px solid #111;
    align-items: center;
  }
  .sub-item { text-align: center; }
  .sub-item .val {
    font-family: 'Orbitron', monospace;
    font-size: 24px; font-weight: 700; color: #ccc;
  }
  .sub-item .lbl { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .sub-item .unt { font-size: 11px; color: #555; }
  .g-num { font-family: 'Orbitron', monospace; font-weight: 900; text-anchor: middle; }
  .g-unit { font-family: 'Share Tech Mono', monospace; text-anchor: middle; }
  .g-lbl { font-family: 'Share Tech Mono', monospace; text-anchor: middle; letter-spacing: 2px; }
  .tk-lbl { font-family: 'Share Tech Mono', monospace; text-anchor: middle; dominant-baseline: middle; }
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <span><span class="status-dot"></span> <span id="date">----/--/--</span></span>
    <span id="alert-bar" class="alert-bar"></span>
    <span id="clock">--:--</span>
  </div>
  <div class="top-gauges">
    <svg id="gs" width="380" height="210" viewBox="0 0 380 210"></svg>
    <div class="gear-indicator">
      <div class="gear-box" id="g4">4</div>
      <div class="gear-box" id="g3">3</div>
      <div class="gear-box" id="g2">2</div>
      <div class="gear-box" id="g1">1</div>
    </div>
    <svg id="gr" width="380" height="210" viewBox="0 0 380 210"></svg>
  </div>
  <div class="mid-gauges">
    <svg id="ge" width="248" height="148" viewBox="0 0 248 148"></svg>
    <svg id="gp" width="248" height="148" viewBox="0 0 248 148"></svg>
    <svg id="gt" width="248" height="148" viewBox="0 0 248 148"></svg>
  </div>
  <div class="sub-strip">
    <div class="sub-item"><div class="lbl">平均燃費</div><div class="val" id="v-ae">--.-</div><div class="unt">km/L</div></div>
    <div class="sub-item"><div class="lbl">走行距離</div><div class="val" id="v-di">---.-</div><div class="unt">km</div></div>
    <div class="sub-item"><div class="lbl">燃料消費</div><div class="val" id="v-fu">--.--</div><div class="unt">L</div></div>
    <div class="sub-item"><div class="lbl">水温</div><div class="val" id="v-ct">--</div><div class="unt">℃</div></div>
    <div class="sub-item"><div class="lbl">負荷</div><div class="val" id="v-ld">--</div><div class="unt">%</div></div>
  </div>
</div>

<script>
const D = Math.PI / 180;
const SA = -135, EA = 135, SW = 270;

function p2xy(cx, cy, r, deg) {
  const rad = deg * D;
  return [cx + r * Math.sin(rad), cy - r * Math.cos(rad)];
}

function arcPath(cx, cy, r, s, e) {
  if (Math.abs(e - s) < 0.3) return '';
  const [x1, y1] = p2xy(cx, cy, r, s);
  const [x2, y2] = p2xy(cx, cy, r, e);
  const lg = Math.abs(e - s) > 180 ? 1 : 0;
  return `M${x1.toFixed(1)},${y1.toFixed(1)}A${r},${r},0,${lg},1,${x2.toFixed(1)},${y2.toFixed(1)}`;
}

function el(svg, tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  svg.appendChild(e);
  return e;
}

let filterCreated = false;
function ensureFilter(svg) {
  if (filterCreated) return;
  filterCreated = true;
  const defs = el(svg, 'defs', {});
  defs.innerHTML = '<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
}

function buildGauge(svgId, cfg) {
  const svg = document.getElementById(svgId);
  const { cx, cy, r, min, max, label, unit, mj, mn, numSz, rzStart, big } = cfg;
  const trackW = big ? 4 : 2.5;
  const arcW = big ? 4 : 2.5;
  const needleW = big ? 2.5 : 1.5;

  ensureFilter(svg);

  // Track
  el(svg, 'path', { d: arcPath(cx, cy, r, SA, EA), fill: 'none', stroke: '#15151e', 'stroke-width': trackW, 'stroke-linecap': 'round' });

  // Red zone
  if (rzStart != null) {
    const rzA = SA + ((rzStart - min) / (max - min)) * SW;
    el(svg, 'path', { d: arcPath(cx, cy, r, rzA, EA), fill: 'none', stroke: '#f44336', 'stroke-width': trackW, 'stroke-linecap': 'round', opacity: '0.15' });
  }

  // Ticks
  const total = mj * mn;
  for (let i = 0; i <= total; i++) {
    const a = SA + (i / total) * SW;
    const isMj = i % mn === 0;
    const ri = isMj ? r - 14 : r - 8;
    const ro = r + 2;
    const [x1, y1] = p2xy(cx, cy, ri, a);
    const [x2, y2] = p2xy(cx, cy, ro, a);
    el(svg, 'line', { x1, y1, x2, y2, stroke: isMj ? '#444' : '#1e1e28', 'stroke-width': isMj ? 1.5 : 0.8 });
    if (isMj) {
      const v = min + (i / total) * (max - min);
      const [lx, ly] = p2xy(cx, cy, r - 24, a);
      const fs = big ? 13 : 11;
      const t = el(svg, 'text', { x: lx, y: ly, class: 'tk-lbl', fill: '#666', 'font-size': fs });
      t.textContent = Math.round(v);
    }
  }

  // Value arc (same radius as track)
  const va = el(svg, 'path', { d: '', fill: 'none', stroke: cfg.color, 'stroke-width': arcW, 'stroke-linecap': 'round', filter: 'url(#gl)' });

  // Needle
  const [nx0, ny0] = p2xy(cx, cy, r - 18, SA);
  const [tx0, ty0] = p2xy(cx, cy, -10, SA);
  const nd = el(svg, 'line', { x1: tx0, y1: ty0, x2: nx0, y2: ny0, stroke: cfg.color, 'stroke-width': needleW, 'stroke-linecap': 'round', filter: 'url(#gl)', 'transform-origin': `${cx}px ${cy}px` });
  nd.style.transition = 'transform 0.4s ease-out';

  // Center dot
  el(svg, 'circle', { cx, cy, r: big ? 5 : 3.5, fill: '#1a1a22', stroke: '#333', 'stroke-width': 1.5 });

  // Number
  const numY = big ? cy + r * 0.42 : cy + r * 0.1;
  const nm = el(svg, 'text', { x: cx, y: numY, class: 'g-num', fill: cfg.color, 'font-size': numSz });
  nm.textContent = '--';

  // Unit
  const ut = el(svg, 'text', { x: cx, y: numY + numSz * 0.7, class: 'g-unit', fill: '#666', 'font-size': big ? 14 : 12 });
  ut.textContent = unit;

  // Label
  if (label) {
    const lb = el(svg, 'text', { x: cx, y: cy - r - 6, class: 'g-lbl', fill: '#555', 'font-size': 12 });
    lb.textContent = label;
  }

  return {
    update(value, col) {
      const clamped = Math.max(min, Math.min(max, value));
      const angle = SA + ((clamped - min) / (max - min)) * SW;
      nd.style.transform = `rotate(${angle - SA}deg)`;
      if (col) {
        nd.setAttribute('stroke', col);
        va.setAttribute('stroke', col);
        nm.setAttribute('fill', col);
      }
      va.setAttribute('d', clamped > min + 0.001 ? arcPath(cx, cy, r, SA, angle) : '');
      nm.textContent = cfg.fmt(value);
    }
  };
}

// --- Color functions ---
function spdCol(v) {
  if (v >= 120) return '#f44336';
  if (v >= 100) return '#ff9800';
  if (v >= 80) return '#ffeb3b';
  if (v >= 60) return '#69f0ae';
  if (v >= 30) return '#42a5f5';
  return '#78909c';
}
function rpmCol(v) {
  if (v >= 5000) return '#f44336';
  if (v >= 4000) return '#ff9800';
  if (v >= 3000) return '#ffeb3b';
  if (v >= 2000) return '#69f0ae';
  if (v >= 1000) return '#42a5f5';
  return '#78909c';
}
function ecoCol(v) {
  if (v >= 20) return '#00e676';
  if (v >= 15) return '#69f0ae';
  if (v >= 10) return '#ffeb3b';
  if (v >= 5) return '#ff9800';
  return '#f44336';
}

// --- Build gauges ---
const gs = buildGauge('gs', {
  cx: 190, cy: 120, r: 98, min: 0, max: 180, color: '#78909c',
  label: 'SPEED', unit: 'km/h', mj: 9, mn: 5, numSz: 38, big: true,
  fmt: v => v > 0.5 ? String(Math.round(v)) : '--'
});
const gr = buildGauge('gr', {
  cx: 190, cy: 120, r: 98, min: 0, max: 8000, color: '#78909c',
  label: 'RPM', unit: 'r/min', mj: 8, mn: 5, numSz: 38, rzStart: 6500, big: true,
  fmt: v => v > 50 ? String(Math.round(v)).padStart(4, '0') : '----'
});
const ge = buildGauge('ge', {
  cx: 124, cy: 78, r: 62, min: 0, max: 30, color: '#69f0ae',
  label: '瞬間燃費', unit: 'km/L', mj: 6, mn: 5, numSz: 26,
  fmt: v => v > 0.1 ? v.toFixed(1) : '--.-'
});
const gp = buildGauge('gp', {
  cx: 124, cy: 78, r: 62, min: 0, max: 100, color: '#ff7043',
  label: '推定出力', unit: 'PS', mj: 5, mn: 4, numSz: 26,
  fmt: v => v > 0.1 ? v.toFixed(1) : '--.-'
});
const gtt = buildGauge('gt', {
  cx: 124, cy: 78, r: 62, min: 0, max: 15, color: '#ffa726',
  label: '推定トルク', unit: 'kgf·m', mj: 5, mn: 3, numSz: 26,
  fmt: v => v > 0.05 ? v.toFixed(1) : '--.-'
});

// --- Gear estimation (DY Demio 4AT) ---
const GEAR_RATIOS = [
  { gear: 1, ratio: 105.2 },
  { gear: 2, ratio: 57.1 },
  { gear: 3, ratio: 37.4 },
  { gear: 4, ratio: 26.4 }
];
const GEAR_TOLERANCE = 0.15;
const gearEls = [null, document.getElementById('g1'), document.getElementById('g2'), document.getElementById('g3'), document.getElementById('g4')];

function estimateGear(rpm, speed) {
  if (speed < 3) return 0;
  const ratio = rpm / speed;
  for (const g of GEAR_RATIOS) {
    if (Math.abs(ratio - g.ratio) / g.ratio <= GEAR_TOLERANCE) return g.gear;
  }
  return 0;
}

function updateGearIndicator(gear) {
  for (let i = 1; i <= 4; i++) {
    gearEls[i].classList.toggle('active', i === gear);
  }
}

// --- Simulation ---
let t = 0, tripDist = 14.6, tripFuel = 0.83;

function sim() {
  t += 0.02;
  const phase = t % 12;
  let speed, rpm, econ, powerPS, torqueKgm, cool, load;

  if (phase < 3) {
    const p = phase / 3;
    speed = p * p * 65;
    rpm = 800 + p * 3200;
    econ = 6 + p * 8;
    powerPS = p * p * 35;
    torqueKgm = p * 8.5;
    cool = 88; load = 20 + p * 40;
  } else if (phase < 7) {
    const w = Math.sin(t * 3) * 3;
    speed = 60 + w;
    rpm = 2200 + Math.sin(t * 2) * 200;
    econ = 16 + Math.sin(t * 1.5) * 3;
    powerPS = 12 + Math.sin(t * 2) * 3;
    torqueKgm = 3.5 + Math.sin(t * 2) * 0.8;
    cool = 90; load = 30 + Math.sin(t * 2) * 5;
  } else if (phase < 9) {
    const p = (phase - 7) / 2;
    speed = 60 + p * 60;
    rpm = 2200 + p * 3800;
    econ = 5 + (1 - p) * 4;
    powerPS = 15 + p * p * 55;
    torqueKgm = 4 + p * 8;
    cool = 92; load = 50 + p * 45;
  } else {
    const p = (phase - 9) / 3;
    speed = 120 * (1 - p * p);
    rpm = 5500 * (1 - p) + 800 * p;
    econ = 25 + p * 5;
    powerPS = 2; torqueKgm = 0.5;
    cool = 91; load = 10 * (1 - p) + 8;
  }

  const dt = 0.05 / 3600;
  tripDist += Math.max(0, speed) * dt;
  tripFuel += (speed > 2 ? speed / Math.max(econ, 1) : 0.8) * dt;
  const avgEco = tripFuel > 0.001 ? tripDist / tripFuel : 0;

  gs.update(Math.max(0, speed), spdCol(speed));
  gr.update(Math.max(0, rpm), rpmCol(rpm));
  if (speed > 2) {
    ge.update(Math.min(30, econ), ecoCol(econ));
  } else {
    ge.update(0, '#555');
  }
  gp.update(Math.max(0, powerPS));
  gtt.update(Math.max(0, torqueKgm));
  updateGearIndicator(estimateGear(rpm, speed));

  document.getElementById('v-ae').textContent = avgEco > 0.1 ? avgEco.toFixed(1) : '--.-';
  document.getElementById('v-di').textContent = tripDist.toFixed(1);
  document.getElementById('v-fu').textContent = tripFuel.toFixed(2);
  document.getElementById('v-ct').textContent = Math.round(cool);
  document.getElementById('v-ld').textContent = Math.round(load);
}

setInterval(sim, 50);
sim();

// --- Clock & Date (Asia/Tokyo) ---
function updateClock() {
  const now = new Date();
  const tz = { timeZone: 'Asia/Tokyo' };
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { ...tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { ...tz, year: 'numeric', month: '2-digit', day: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// --- Alert rotation (10s) ---
const alerts = [
  'オイル交換まで 1,200 km',
  'ATF交換まで 3,200 km',
  'タイヤローテーションまで 4,800 km'
];
let alertIdx = 0;
function updateAlert() {
  const bar = document.getElementById('alert-bar');
  if (alerts.length === 0) { bar.classList.remove('active'); return; }
  bar.classList.add('active');
  const prefix = alerts.length > 1 ? `\u26A0 ${alertIdx + 1}/${alerts.length} ` : '\u26A0 ';
  bar.textContent = prefix + alerts[alertIdx];
  alertIdx = (alertIdx + 1) % alerts.length;
}
updateAlert();
setInterval(updateAlert, 10000);
</script>
</body>
</html>
