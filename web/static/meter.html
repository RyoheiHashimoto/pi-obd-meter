<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>pi-obd-meter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #ccc;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    width: 800px; height: 480px;
    overflow: hidden;
    margin: 0 auto;
    cursor: none;
  }
  .dashboard {
    height: 100%;
  }
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid #ffb74d;
    border-radius: 8px;
    padding: 16px 32px;
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #ffd54f;
    text-align: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease-in-out;
  }
  .toast.show { opacity: 1; }
  .gauges {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .gauges svg { margin: 0; }
  .center-bars {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 6px;
    height: 330px;
    z-index: 10;
  }
  .vbar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 24px;
  }
  .vbar-val {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    margin-bottom: 2px;
    height: 14px;
    line-height: 14px;
  }
  .vbar-wrap {
    flex: 1;
    width: 100%;
    background: #111;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .vbar-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: #555;
    transition: height 0.3s ease-out, background-color 0.3s;
    border-radius: 3px;
  }
  .vbar-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #666;
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .g-num { font-family: 'Orbitron', monospace; font-weight: 900; text-anchor: middle; }
  .g-unit { font-family: 'Share Tech Mono', monospace; text-anchor: middle; }
  .g-lbl { font-family: 'Share Tech Mono', monospace; text-anchor: middle; letter-spacing: 2px; }
  .tk-lbl { font-family: 'Share Tech Mono', monospace; text-anchor: middle; dominant-baseline: middle; }
</style>
</head>
<body>
<div class="dashboard">
  <div class="gauges">
    <svg id="gs" width="400" height="480" viewBox="0 0 400 480"></svg>
    <div class="center-bars">
      <div class="vbar-col">
        <span class="vbar-val" id="throttle-val">--</span>
        <div class="vbar-wrap"><div class="vbar-fill" id="throttle-fill"></div></div>
        <span class="vbar-name">THR</span>
      </div>
      <div class="vbar-col">
        <span class="vbar-val" id="load-val">--</span>
        <div class="vbar-wrap"><div class="vbar-fill" id="load-fill"></div></div>
        <span class="vbar-name">LOAD</span>
      </div>
    </div>
    <svg id="gr" width="400" height="480" viewBox="0 0 400 480"></svg>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const D = Math.PI / 180;
const SA = -135, EA = 135, SW = 270;

function p2xy(cx, cy, r, deg) {
  const rad = deg * D;
  return [cx + r * Math.sin(rad), cy - r * Math.cos(rad)];
}

function arcPath(cx, cy, r, s, e) {
  if (Math.abs(e - s) < 0.3) return '';
  const [x1, y1] = p2xy(cx, cy, r, s);
  const [x2, y2] = p2xy(cx, cy, r, e);
  const lg = Math.abs(e - s) > 180 ? 1 : 0;
  return `M${x1.toFixed(1)},${y1.toFixed(1)}A${r},${r},0,${lg},1,${x2.toFixed(1)},${y2.toFixed(1)}`;
}

function el(svg, tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  svg.appendChild(e);
  return e;
}

let filterCreated = false;
function ensureFilter(svg) {
  if (filterCreated) return;
  filterCreated = true;
  const defs = el(svg, 'defs', {});
  defs.innerHTML = '<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
}

function buildGauge(svgId, cfg) {
  const svg = document.getElementById(svgId);
  const { cx, cy, r, min, max, label, unit, mj, mn, numSz, tkSz, rzStart } = cfg;
  const tickFontSize = tkSz || 15;

  ensureFilter(svg);

  // Track
  el(svg, 'path', { d: arcPath(cx, cy, r, SA, EA), fill: 'none', stroke: '#15151e', 'stroke-width': 5, 'stroke-linecap': 'round' });

  // Red zone
  if (rzStart != null) {
    const rzA = SA + ((rzStart - min) / (max - min)) * SW;
    el(svg, 'path', { d: arcPath(cx, cy, r, rzA, EA), fill: 'none', stroke: '#f44336', 'stroke-width': 5, 'stroke-linecap': 'round', opacity: '0.15' });
  }

  // Ticks
  const total = mj * mn;
  for (let i = 0; i <= total; i++) {
    const a = SA + (i / total) * SW;
    const isMj = i % mn === 0;
    const ri = isMj ? r - 20 : r - 10;
    const ro = r + 2;
    const [x1, y1] = p2xy(cx, cy, ri, a);
    const [x2, y2] = p2xy(cx, cy, ro, a);
    el(svg, 'line', { x1, y1, x2, y2, stroke: isMj ? '#444' : '#1e1e28', 'stroke-width': isMj ? 1.5 : 0.8 });
    if (isMj) {
      const v = min + (i / total) * (max - min);
      const [lx, ly] = p2xy(cx, cy, r - 34, a);
      const t = el(svg, 'text', { x: lx, y: ly, class: 'tk-lbl', fill: '#666', 'font-size': tickFontSize });
      t.textContent = Math.round(v);
    }
  }

  // Value arc
  const va = el(svg, 'path', { d: '', fill: 'none', stroke: cfg.color, 'stroke-width': 5, 'stroke-linecap': 'round', filter: 'url(#gl)' });

  // Needle
  const [nx0, ny0] = p2xy(cx, cy, r - 24, SA);
  const [tx0, ty0] = p2xy(cx, cy, -14, SA);
  const nd = el(svg, 'line', { x1: tx0, y1: ty0, x2: nx0, y2: ny0, stroke: cfg.color, 'stroke-width': 3, 'stroke-linecap': 'round', filter: 'url(#gl)', 'transform-origin': `${cx}px ${cy}px` });
  nd.style.transition = 'transform 0.3s ease-out';

  // Center dot
  el(svg, 'circle', { cx, cy, r: 6, fill: '#1a1a22', stroke: '#333', 'stroke-width': 1.5 });

  // Number
  const numY = cy + r * 0.38;
  const nm = el(svg, 'text', { x: cx, y: numY, class: 'g-num', fill: cfg.color, 'font-size': numSz });
  nm.textContent = '--';

  // Unit
  const ut = el(svg, 'text', { x: cx, y: numY + numSz * 0.65, class: 'g-unit', fill: '#666', 'font-size': 18 });
  ut.textContent = unit;

  // Label
  if (label) {
    const lb = el(svg, 'text', { x: cx, y: cy - r - 10, class: 'g-lbl', fill: '#555', 'font-size': 16 });
    lb.textContent = label;
  }

  // Lerp interpolation for smooth arc + number
  let curVal = min;
  let tgtVal = min;
  let rafId = 0;

  function lerp() {
    const d = tgtVal - curVal;
    if (Math.abs(d) > 0.05) {
      curVal += d * 0.15;
    } else {
      curVal = tgtVal;
    }
    const c = Math.max(min, Math.min(max, curVal));
    const a = SA + ((c - min) / (max - min)) * SW;
    va.setAttribute('d', c > min + 0.001 ? arcPath(cx, cy, r, SA, a) : '');
    nm.textContent = cfg.fmt(curVal);
    if (Math.abs(curVal - tgtVal) > 0.01) {
      rafId = requestAnimationFrame(lerp);
    } else {
      rafId = 0;
    }
  }

  return {
    update(value, col) {
      tgtVal = value;
      const clamped = Math.max(min, Math.min(max, value));
      const angle = SA + ((clamped - min) / (max - min)) * SW;
      nd.style.transform = `rotate(${angle - SA}deg)`;
      if (col) {
        nd.setAttribute('stroke', col);
        va.setAttribute('stroke', col);
        nm.setAttribute('fill', col);
      }
      if (!rafId) rafId = requestAnimationFrame(lerp);
    }
  };
}

// --- Color functions ---
function spdCol(v) {
  if (v >= 120) return '#f44336';
  if (v >= 100) return '#ff9800';
  if (v >= 80) return '#ffeb3b';
  if (v >= 60) return '#69f0ae';
  if (v >= 30) return '#42a5f5';
  return '#78909c';
}
function rpmCol(v) {
  if (v >= 5000) return '#f44336';
  if (v >= 4000) return '#ff9800';
  if (v >= 3000) return '#ffeb3b';
  if (v >= 2000) return '#69f0ae';
  if (v >= 1000) return '#42a5f5';
  return '#78909c';
}

// --- Efficiency indicator (vertical bars) ---
const throttleFill = document.getElementById('throttle-fill');
const throttleVal = document.getElementById('throttle-val');
const loadFill = document.getElementById('load-fill');
const loadVal = document.getElementById('load-val');
function updateBars(rpm, load, throttle, speed) {
  // スロットル開度バー（縦）
  throttleFill.style.height = Math.min(100, throttle) + '%';
  throttleVal.textContent = throttle > 0 ? Math.round(throttle) : '--';
  throttleFill.style.backgroundColor = throttle > 80 ? '#e040fb' : throttle > 50 ? '#29b6f6' : '#78909c';

  // 負荷バー（縦、ラギング指数で色が変わる）
  loadFill.style.height = Math.min(100, load) + '%';
  loadVal.textContent = load > 0 ? Math.round(load) : '--';

  if (speed < 15 || rpm < 500) {
    loadFill.style.backgroundColor = '#555';
    return;
  }

  // ラギング指数 = 負荷 / RPM × 1000
  const lugging = load / rpm * 1000;
  if (lugging > 30) {
    loadFill.style.backgroundColor = '#f44336';
  } else if (lugging > 22) {
    loadFill.style.backgroundColor = '#ff9800';
  } else {
    loadFill.style.backgroundColor = '#4caf50';
  }
}

// --- Toast notification ---
const toastEl = document.getElementById('toast');
let lastNotification = '';
let toastTimer = null;

function showToast(msg) {
  if (msg === lastNotification) return;
  lastNotification = msg;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.classList.remove('show'); }, 5000);
}

// --- Config defaults ---
const DEFAULTS = {
  redline_rpm: 6500,
  max_speed_kmh: 180,
  max_rpm: 8000
};

let gs, gr;

// --- Realtime API polling ---
let connected = false;
let prevAlertCount = 0;

function applyData(d) {
  const spd = d.speed_kmh || 0;
  const rpm = d.rpm || 0;
  const load = d.engine_load || 0;
  const throttle = d.throttle_pos || 0;

  gs.update(spd, spdCol(spd));
  gr.update(rpm, rpmCol(rpm));
  updateBars(rpm, load, throttle, spd);

  // Maintenance alerts as toast
  const alertCount = d.alerts ? d.alerts.length : 0;
  if (alertCount > 0 && alertCount !== prevAlertCount) {
    const a = d.alerts[0];
    const r = a.reminder;
    const remain = r.type === 'distance'
      ? `${Math.round(a.remaining_km).toLocaleString()} km`
      : `${a.days_left} 日`;
    showToast(`⚠ ${r.name}まで ${remain}`);
  }
  prevAlertCount = alertCount;

  // Toast notification (refueling etc.)
  if (d.notification) {
    showToast(d.notification);
  } else if (lastNotification) {
    lastNotification = '';
  }
}

async function fetchRealtime() {
  try {
    const resp = await fetch('/api/realtime');
    if (!resp.ok) throw new Error(resp.status);
    const d = await resp.json();
    connected = true;
    applyData(d);
  } catch (e) {
    if (connected || !simMode) {
      connected = false;
      if (!simMode) startSimMode();
    }
  }
}

// --- Simulation fallback ---
let simMode = false;
let simT = 0;

function startSimMode() {
  simMode = true;
  setInterval(simTick, 50);
}

function simTick() {
  simT += 0.02;
  const phase = simT % 16;
  let speed, rpm, load, throttle;

  if (phase < 3) {
    // 発進加速
    const p = phase / 3;
    speed = p * p * 60; rpm = 800 + p * 3200;
    load = 25 + p * 45; throttle = 20 + p * 50;
  } else if (phase < 7) {
    // 巡航（効率的）
    speed = 60 + Math.sin(simT * 3) * 3;
    rpm = 2200 + Math.sin(simT * 2) * 200;
    load = 28 + Math.sin(simT * 2) * 5; throttle = 18 + Math.sin(simT * 2) * 4;
  } else if (phase < 10) {
    // ラギング（低回転+高負荷）→ SHIFT DOWN 表示
    speed = 45 + Math.sin(simT * 2) * 3;
    rpm = 1300 + Math.sin(simT * 3) * 100;
    load = 65 + Math.sin(simT * 1.5) * 8; throttle = 55 + Math.sin(simT * 1.5) * 10;
  } else if (phase < 13) {
    // シフトダウン後の加速
    const p = (phase - 10) / 3;
    speed = 45 + p * 40; rpm = 2800 + p * 2000;
    load = 45 + p * 30; throttle = 40 + p * 40;
  } else {
    // 減速
    const p = (phase - 13) / 3;
    speed = 85 * (1 - p * p); rpm = 4800 * (1 - p) + 800 * p;
    load = 8 + (1 - p) * 5; throttle = 3 + (1 - p) * 5;
  }

  gs.update(Math.max(0, speed), spdCol(speed));
  gr.update(Math.max(0, rpm), rpmCol(rpm));
  updateBars(rpm, load, throttle, speed);
}

// --- Start ---
async function initApp() {
  let conf = DEFAULTS;
  try {
    const resp = await fetch('/api/config');
    if (resp.ok) conf = { ...DEFAULTS, ...await resp.json() };
  } catch (e) { /* file:// mode */ }

  gs = buildGauge('gs', {
    cx: 200, cy: 240, r: 185, min: 0, max: conf.max_speed_kmh, color: '#78909c',
    label: 'SPEED', unit: 'km/h', mj: 9, mn: 5, numSz: 54, tkSz: 17,
    fmt: v => v > 0.5 ? String(Math.round(v)) : '--'
  });
  gr = buildGauge('gr', {
    cx: 200, cy: 240, r: 185, min: 0, max: conf.max_rpm, color: '#78909c',
    label: 'RPM', unit: 'r/min', mj: 8, mn: 5, numSz: 54, tkSz: 17, rzStart: conf.redline_rpm,
    fmt: v => v > 50 ? String(Math.round(v)).padStart(4, '0') : '----'
  });

  fetchRealtime();
  setInterval(fetchRealtime, 200);
}
initApp();
</script>
</body>
</html>
