name: Deploy GAS

on:
  push:
    branches: [main, develop]
    paths:
      - 'gas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint GAS code
        run: npx eslint gas/*.gs

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: |
          echo '{
            "tokens": {
              "default": {
                "client_id": "1072944905499-vm2v2i5dvn0a0d2o4ca36i1vge8cvbn0.apps.googleusercontent.com",
                "client_secret": "v6V3fKV_zWU7iw1DrpO1rknX",
                "type": "authorized_user",
                "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}",
                "access_token": ""
              }
            }
          }' > ~/.clasprc.json

      - name: Push to GAS
        run: cd gas && clasp push

      - name: Deploy to production
        run: cd gas && clasp deploy -i AKfycbwYszp7P8kYlZabnLgUTCLUHqOZ-cBS1nv9umJp6NGXcyArT83PMJq_AfmEH3Pk_SshFg
