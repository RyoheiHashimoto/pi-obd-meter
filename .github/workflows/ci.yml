name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SDL2 dev libs (CGo 依存)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E '(total:|^github)' | grep -v 'total:' | awk '{printf "%-50s %s\n", $1, $3}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "**Total: ${COVERAGE}%**" >> $GITHUB_STEP_SUMMARY

      - name: Build (host, CGo 有効)
        run: |
          CGO_ENABLED=1 go build -o pi-obd-meter ./cmd/pi-obd-meter
          CGO_ENABLED=1 go build -o pi-obd-scanner ./cmd/pi-obd-scanner

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SDL2 dev libs (arm64)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev

      - name: Build (ARM64 native)
        run: |
          CGO_ENABLED=1 go build -o pi-obd-meter-arm64 ./cmd/pi-obd-meter
          CGO_ENABLED=1 go build -o pi-obd-scanner-arm64 ./cmd/pi-obd-scanner
