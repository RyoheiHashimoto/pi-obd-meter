name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "## Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Build (host)
        run: |
          go build -o pi-obd-meter ./cmd/pi-obd-meter
          go build -o pi-obd-scanner ./cmd/pi-obd-scanner

      - name: Build (ARM64 cross-compile)
        run: |
          GOOS=linux GOARCH=arm64 go build -o pi-obd-meter-arm64 ./cmd/pi-obd-meter
          GOOS=linux GOARCH=arm64 go build -o pi-obd-scanner-arm64 ./cmd/pi-obd-scanner
