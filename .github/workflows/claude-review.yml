name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a code reviewer for a Go project (OBD-2 car meter on Raspberry Pi).
            Review this PR thoroughly. Follow CLAUDE.md conventions.

            ## Review process

            1. Read the PR diff and understand the changes
            2. Run `go build ./...` and `go test -race ./...` to verify
            3. Check for:
               - Bugs and logic errors
               - Security issues
               - Go best practices (gofmt, govet, errcheck violations)
               - Missing test coverage for changed code

            ## Actions

            - **Minor issues** (formatting, lint): Fix them silently with a commit
            - **Medium issues** (bugs, missing error handling): Fix and commit with explanation
            - **Design decisions**: Leave a review comment asking the author, do NOT fix
            - **All clear**: If no issues found, approve the PR

            ## Rules

            - Commit each fix separately with a clear message in Japanese
            - Always run `go build ./...` and `go test -race ./...` after any fix
            - If you made fixes, submit a review with COMMENT summarizing what you changed
            - If no issues found (or only minor fixes), APPROVE the PR
            - If there are unresolved design questions, REQUEST_CHANGES with clear explanation
            - Review comments in Japanese

          claude_args: "--max-turns 15"
