name: Deploy Dev

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SDL2 dev libs (ARM64)
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev

      - name: Build ARM64 binaries (native, CGO)
        env:
          CGO_ENABLED: "1"
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA::7}"
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=dev-${SHORT_SHA}" \
            -o pi-obd-meter ./cmd/pi-obd-meter
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=dev-${SHORT_SHA}" \
            -o pi-obd-scanner ./cmd/pi-obd-scanner

      - name: Package
        run: |
          tar czf pi-obd-meter-dev.tar.gz \
            pi-obd-meter \
            pi-obd-scanner \
            web/static/

      - name: Update dev-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA::7}"

          # 既存の dev-latest リリースを削除（あれば）
          gh release delete dev-latest --yes 2>/dev/null || true
          git tag -d dev-latest 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true

          # 新しい dev-latest リリースを作成
          git tag dev-latest
          git push origin dev-latest
          gh release create dev-latest \
            --title "Development Build (${SHORT_SHA})" \
            --notes "Auto-built from develop branch at $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Commit: ${{ github.event.workflow_run.head_sha }}" \
            --prerelease \
            pi-obd-meter-dev.tar.gz
