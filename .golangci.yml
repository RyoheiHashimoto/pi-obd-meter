version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1005"
        - "-QF1003"

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
