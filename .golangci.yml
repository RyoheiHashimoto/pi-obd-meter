run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - misspell

linters-settings:
  errcheck:
    exclude-functions:
      # HTTP handler helpers (error already sent to client)
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
